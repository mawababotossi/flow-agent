# Pipeline TO-BE : Formation des Acteurs de la Chaîne du Livre
# Service GRATUIT — Ministère de la Culture / DLPL
# Architecture : XPortal (Citoyen) ↔ Kafka ↔ XFlow (Back-Office)

pipeline:
  - step: 1
    name: "Soumission de la candidature en ligne"
    actor: "Candidat (Citoyen)"
    system: "XPortal"
    action: "Le candidat remplit le formulaire Form.io (informations personnelles, profil littéraire, motivation) et uploade ses pièces justificatives (pièce d'identité, échantillon d'œuvre)."
    inputs:
      - "Nom, Prénom (e-ID pré-rempli)"
      - "Email, Téléphone (e-ID pré-rempli)"
      - "Date de naissance"
      - "Catégorie d'acteur (Écrivain, Bibliothécaire, Libraire, Éditeur, Autre)"
      - "Dernier diplôme obtenu"
      - "Motivation (texte libre)"
      - "Pièce d'identité (upload PDF/JPEG, max 2 Mo)"
      - "Échantillon d'œuvre (upload PDF, max 5 Mo)"
    output: "Dossier de candidature créé avec numéro de suivi automatique. Accusé de réception Email/SMS."

  - step: 2
    name: "Réception et enregistrement automatique"
    actor: "Système"
    system: "XFlow"
    action: "Le moteur BPMN reçoit le dossier via Kafka (MSG_FORM_ACT_LIVRE_START), l'enregistre, et l'ajoute à la file de traitement."
    inputs:
      - "Données du formulaire soumis"
    output: "Dossier enregistré, numéro de suivi attribué, notification interne aux agents."

  - step: 3
    name: "Vérification de conformité du dossier"
    actor: "Agent DLPL (Back-Office)"
    system: "XFlow"
    action: "L'agent vérifie la conformité des pièces (identité valide, échantillon d'œuvre présent et lisible, catégorie cohérente). Trois décisions possibles."
    inputs:
      - "Dossier du candidat"
      - "Pièces justificatives uploadées"
    output: |
      Décision :
      - « Conforme » → Passage à l'évaluation par le jury (étape 4)
      - « Correction requise » → Message Kafka vers XPortal, le candidat reçoit une notification avec le motif et peut corriger son dossier en ligne (boucle de resoumission, max 3 tentatives)
      - « Rejeté » → Notification Email/SMS de rejet avec motif. Fin du processus pour ce candidat.

  - step: 4
    name: "Évaluation par le jury"
    actor: "Directeur DLPL / Jury (Agents DLPL)"
    system: "XFlow"
    action: "Le Directeur constitue le jury. Le jury évalue la qualité de l'œuvre soumise et la pertinence du profil du candidat via le tableau de bord GNSPD. Décision de sélection ou non-sélection."
    inputs:
      - "Dossier conforme du candidat"
      - "Échantillon d'œuvre"
    output: |
      Décision :
      - « Sélectionné » → Passage à la notification d'admission (étape 5)
      - « Non sélectionné » → Notification Email/SMS de non-sélection avec commentaire. Fin du processus.

  - step: 5
    name: "Notification d'admission et convocation"
    actor: "Système"
    system: "XFlow → XPortal"
    action: "Notification automatique multicanal (Email + SMS) au candidat sélectionné avec les détails de la formation (dates, lieu, programme). Le candidat confirme sa participation via le portail."
    inputs:
      - "Décision de sélection"
      - "Informations formation (dates, lieu)"
    output: "Candidat notifié, confirmation de participation enregistrée sur le portail."

  - step: 6
    name: "Génération et délivrance de l'attestation"
    actor: "Système"
    system: "XFlow"
    action: "Après la formation, génération automatique du PDF d'attestation de formation avec QR Code anti-fraude. Notification Email/SMS au candidat. Téléchargement disponible sur le portail."
    inputs:
      - "Données du candidat"
      - "Modèle d'attestation"
    output: "Attestation PDF générée avec QR Code, disponible en téléchargement sur le portail citoyen."
