pipeline:
  - step: 1
    name: "Soumission de la demande en ligne"
    actor: "Citoyen"
    system: "XPortal"
    action: "Le citoyen remplit le formulaire de demande de casier judiciaire (identité pré-remplie via e-ID), uploade sa pièce d'identité et son acte de naissance, puis soumet le dossier."
    inputs:
      - "Pièce d'identité nationale ou passeport (scan/photo)"
      - "Acte de naissance (scan/photo)"
      - "Motif de la demande (emploi, concours, visa, autre)"
    output: "Dossier soumis — accusé de réception automatique (email + SMS)"

  - step: 2
    name: "Transmission au back-office"
    actor: "Système"
    system: "XPortal → XFlow (Kafka)"
    action: "XPortal envoie le dossier au moteur XFlow via Kafka. XFlow enregistre le dossier et met à jour le statut portail (Soumis)."
    inputs:
      - "Données du formulaire"
      - "Pièces jointes"
    output: "Dossier enregistré dans XFlow — statut portail 'Soumis'"

  - step: 3
    name: "Paiement des frais de délivrance"
    actor: "Citoyen"
    system: "XPortal (redirection e-Gov)"
    action: "XFlow ordonne le paiement (2 000 FCFA fixe). XPortal redirige le citoyen vers la plateforme de paiement e-Gov externe (Flooz, TMoney, Visa, Mastercard). Le callback e-Gov confirme le paiement à XFlow."
    inputs:
      - "Montant : 2 000 FCFA (fixe)"
    output: "Paiement confirmé — reçu électronique généré"

  - step: 4
    name: "Instruction du dossier"
    actor: "Agent instructeur DACS"
    system: "XFlow"
    type: "humain"
    sla: "72h"
    action: "L'agent instructeur vérifie la conformité des pièces (identité, acte de naissance), consulte le fichier national des condamnations (fichier papier), rédige le bulletin (néant ou mentions) et saisit le résultat dans le formulaire d'instruction."
    inputs:
      - "Données du formulaire citoyen"
      - "Pièces jointes (PI, acte de naissance)"
      - "Fichier national des condamnations (consultation manuelle)"
    output: "Décision : Conforme / Non conforme (correction) / Rejeté + bulletin rédigé"

  - step: 4a
    name: "Boucle de correction"
    actor: "Citoyen"
    system: "XPortal"
    type: "humain"
    retry:
      max: 3
      timer: "P15D"
    action: "Si pièces non conformes (identité expirée, acte illisible), l'agent demande une correction. Le citoyen reçoit une notification (SMS + email) avec le motif, corrige via son dossier existant sur le portail, et resoumets. Le dossier repasse à l'instruction."
    inputs:
      - "Motif de correction"
      - "Pièces corrigées"
    output: "Dossier corrigé resoumis — retour à l'étape 4"

  - step: 5
    name: "Validation par le chef de service"
    actor: "Chef de service DACS"
    system: "XFlow"
    type: "humain"
    sla: "24h"
    action: "Le chef de service contrôle le bulletin rédigé par l'agent instructeur, valide ou rejette. En cas de validation, le bulletin est signé et cacheté manuellement."
    inputs:
      - "Bulletin rédigé par l'agent instructeur"
    output: "Bulletin validé, signé et cacheté — prêt au retrait"

  - step: 6
    name: "Notification — bulletin prêt"
    actor: "Système"
    system: "XFlow"
    action: "XFlow notifie le citoyen par SMS et email que son bulletin de casier judiciaire est prêt à être retiré. Le statut portail passe à 'Succès'. Le récépissé de retrait est mis à disposition sur le portail."
    inputs:
      - "Numéro de dossier"
      - "Coordonnées citoyen (email, téléphone)"
    output: "Citoyen notifié — récépissé de retrait disponible"

  - step: 7
    name: "Retrait du bulletin — PHYSIQUE"
    actor: "Citoyen"
    system: "Guichet DACS"
    type: "physique"
    action: "Le citoyen se présente au guichet de la DACS avec son récépissé (imprimé ou affiché sur téléphone) et sa pièce d'identité originale. L'agent de guichet remet le bulletin signé et cacheté. Obligation légale : le bulletin porte une signature manuscrite et un cachet humide."
    inputs:
      - "Récépissé de retrait"
      - "Pièce d'identité originale"
    output: "Bulletin de casier judiciaire n°3 remis au citoyen"
